kind = "web"
previewPath = "/"
title = "White Stone Agarbatti"
version = "1.0.0"
id = "artifacts/white-stone"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24929

[services.development]
run = "pnpm --filter @workspace/white-stone run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/white-stone", "run", "build" ]
publicDir = "artifacts/white-stone/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24929"
BASE_PATH = "/"
